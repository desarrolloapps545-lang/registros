#ingresoLider {

/* Loader (Pantalla de carga) */
.loader-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.8); display: flex; justify-content: center; align-items: center; z-index: 2000; transition: opacity 0.5s ease-out, visibility 0.5s ease-out; }
.loader-overlay.fade-out { opacity: 0; visibility: hidden; }
.loader { border: 6px solid #f3f3f3; border-top: 6px solid #0b7a3b; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

/* Toast (Mensajes emergentes) */
.toast { visibility: hidden; min-width: 250px; margin-left: -125px; background-color: #333; color: #fff; text-align: center; border-radius: 4px; padding: 16px; position: fixed; z-index: 2001; left: 50%; bottom: 30px; font-size: 17px; }
.toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
@keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
@keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }

/* Animación de entrada para paneles */
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeInCentered { from { opacity: 0; transform: translate(-50%, -60%); } to { opacity: 1; transform: translate(-50%, -50%); } }

    const modalEditTelefono = document.getElementById("modalEditTelefono");

    /* ===============================

    ==================================*/
    function showLoader() { loaderOverlay.classList.remove("hidden"); }
    function hideLoader() { loaderOverlay.classList.add("hidden"); }
    
    function showToast(message) {

    /* ===============================

    function validarCampos() {

        if (!apellidos.value.trim()) return "Ingrese los apellidos";
        if (!cedula.value.trim()) return "Ingrese la cédula";

        if (!municipio.value.trim()) return "Ingrese el municipio";

    /* ===============================

    async function iniciarSesion() {

    function validarFechaISO(fechaISO) {
        if(!fechaISO) return {ok:false, msg:"Seleccione fecha"};
        const parts = fechaISO.split("-");
        if(parts.length !== 3) return {ok:false, msg:"Fecha inválida"};
        const y = parseInt(parts[0], 10);
        const m = parseInt(parts[1], 10);
        const d = parseInt(parts[2], 10);
        if(y < 1900) return {ok:false, msg:"La fecha debe ser a partir del 1900"};
        const hoy = new Date();
        const fecha = new Date(y, m-1, d);
        if(fecha > hoy) return {ok:false, msg:"La fecha no puede ser mayor al día de hoy"};

        return {ok:true, day:String(d).padStart(2,"0"), month:String(m).padStart(2,"0"), year:String(y)};
    }

    // Función auxiliar para obtener la hora actual de Colombia (UTC-5) en formato ISO
    function getFechaHoraColombia() {
        const now = new Date();
        const offset = -5; // Colombia es UTC-5
        const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
        const colDate = new Date(utc + (3600000 * offset));
        
        // Construir string ISO manualmente para asegurar el offset
        const pad = (n) => n.toString().padStart(2, '0');
        return `${colDate.getFullYear()}-${pad(colDate.getMonth()+1)}-${pad(colDate.getDate())}T` +
               `${pad(colDate.getHours())}:${pad(colDate.getMinutes())}:${pad(colDate.getSeconds())}-05:00`;
    }

    /* ===============================
       GUARDAR REGISTRO
    ==================================*/
    async function guardarRegistro() {

        const faltante = validarCampos();
        if (faltante) {
            alert(faltante);
            return;
        }

        const check = validarFechaISO(fechaExpedicion.value);
        if(!check.ok) {
            errorFecha.style.display = "block";
            errorFecha.innerText = check.msg;
            return;
        }
        errorFecha.style.display = "none";

        showLoader(); // Mostrar carga

        try {
            const fechaFormatDB = `${check.year}-${check.month}-${check.day}`; // YYYY-MM-DD para Supabase

            const datosRegistro = {
                nombres: nombres.value.trim(),
                apellidos: apellidos.value.trim(),
                cedula: cedula.value.trim(),
                fecha_expedicion: fechaFormatDB,
                telefono: telefono.value.trim(),
                direccion: direccion.value.trim(),
                barrio: barrio.value.trim(),
                municipio: municipio.value.trim(),
                responsable: responsable.value.trim()
            };
            
            // INSERT
            datosRegistro.lider = currentUser ? currentUser.name : "Anon";
            datosRegistro.created_at = getFechaHoraColombia(); // Forzar hora Colombia solo al crear
            
            const { error } = await supabase.from('registros').insert([datosRegistro]);
            if (!error) {

                nombres.value = apellidos.value = cedula.value = "";
                fechaExpedicion.value = telefono.value = "";
                direccion.value = barrio.value = municipio.value = "";
                responsable.value = "";

                showToast("Registro creado exitosamente");
                nombres.focus(); // Enfocar para el siguiente
            } else {
                alert("Error al guardar en Supabase: " + error.message);
            }
        } catch(err) {
            console.error(err);
            alert("Error de conexión");
        }
        hideLoader(); // Ocultar carga
    }

    window.eliminarRegistro = async function(id) {
        if(!confirm("¿Está seguro de eliminar este registro?")) return;
        
        showLoader();
        const { error } = await supabase.from('registros').delete().eq('id', id);
        hideLoader();

        if(error) {
            alert("Error al eliminar: " + error.message);
        } else {
            showToast("Registro eliminado");
            // Recargar la tabla según el rol
            if (currentUser.role === 'Administrador' || currentUser.role === 'Administrador maestro' || currentUser.role === 'admin') {
                verRegistros('admin');
            } else {
                verRegistros('lider');
            }
        }
    };

    async function actualizarRegistro() {
        const editId = modalEditRegistroId.value;

        // Validar campos del modal
        const check = validarFechaISO(modalEditFechaExpedicion.value);
        if(!check.ok) {
            modalEditErrorFecha.style.display = "block";
            modalEditErrorFecha.innerText = check.msg;
            return;
        }
        modalEditErrorFecha.style.display = "none";

        const datosRegistro = {
            nombres: modalEditNombres.value.trim(),
            apellidos: modalEditApellidos.value.trim(),
            cedula: modalEditCedula.value.trim(),
            fecha_expedicion: `${check.year}-${check.month}-${check.day}`,
            telefono: modalEditTelefono.value.trim(),
            direccion: modalEditDireccion.value.trim(),
            barrio: modalEditBarrio.value.trim(),
            municipio: modalEditMunicipio.value.trim(),
            responsable: modalEditResponsable.value.trim()
        };

        // Validar que no estén vacíos
        for (const key in datosRegistro) {
            if (!datosRegistro[key]) {
                alert(`El campo ${key} no puede estar vacío.`);
                return;
            }
        }

        showLoader();
        const { error } = await supabase.from('registros').update(datosRegistro).eq('id', editId);
        hideLoader();

        if (error) {
            alert("Error al actualizar: " + error.message);
        } else {
            modalEditarRegistro.classList.add("hidden");
            showToast("Registro actualizado");
            // Recargar la tabla
            if (currentUser.role.includes('Administrador') || currentUser.role === 'admin') {
                verRegistros('admin');
            } else {
                verRegistros('lider');
            }
        }
    }


    /* ======================================
       ADMINISTRADOR: GESTIÓN DE USUARIOS
    =======================================*/
    async function cargarUsuarios() {
        const { data, error } = await supabase.from('users').select('*').order('id', {ascending: false});
        if(error) return console.error(error);

        let html = "";

        data.forEach(u => {
            // Filtro: No mostrar al usuario actual
            if (u.id === currentUser.id) return;

            // Filtro: Administradores no ven a Administradores maestros
            if (currentUser.role !== 'Administrador maestro' && u.role === 'Administrador maestro') {
                return;
            }
            
            // Botones de acción
            const btnEditar = `<button class="btn secondary icon-only btnEditarUsuario" data-user='${JSON.stringify(u)}' title="Editar"><i class="fas fa-edit"></i></button>`;
            const btnEliminar = `<button class="btn danger icon-only btnEliminarUsuario" data-id="${u.id}" title="Eliminar"><i class="fas fa-trash-alt"></i></button>`;
            const acciones = `<div style="display:flex; gap: 5px;">${btnEditar}${btnEliminar}</div>`;

            html += `<tr>
                <td>${u.name || ''}</td>
                <td>${u.user_name || ''}</td>
                <td>${u.role}</td>
                <td>${u.cedula || 'N/A'}</td>
                <td>${acciones}</td>
            </tr>`;
        });
        listaUsuarios.innerHTML = html;

        // Asignar eventos a los botones generados dinámicamente
        document.querySelectorAll(".btnEditarUsuario").forEach(b => {
            b.addEventListener("click", (e) => {
                const u = JSON.parse(e.currentTarget.dataset.user);
                abrirModalEdicion(u);
            });
        });

        document.querySelectorAll(".btnEliminarUsuario").forEach(b => {
            b.addEventListener("click", (e) => {
                eliminarUsuario(e.currentTarget.dataset.id);
            });
        });
    }

    /* ======================================
       CREAR / EDITAR / ELIMINAR USUARIO
    =======================================*/
    
    // Auto-completar últimos 4 dígitos
    newUserCedula.addEventListener("input", (e) => {
        const val = e.target.value;
        if(val.length >= 4) {
            newUserDigits.value = val.slice(-4);
        } else {
            newUserDigits.value = val;
        }
    });

    function abrirModalCreacion() {
        modalUsuarioTitulo.innerText = "Nuevo Usuario";
        editUserIdInput.value = ""; // Vacio = Crear
        newUserUserName.value = "";
        newUserName.value = "";
        newUserCedula.value = "";
        newUserDigits.value = "";
        
        // Actualizar texto botón
        document.getElementById("btnGuardarUsuario").innerHTML = '<i class="fas fa-save"></i> Crear';
        modalCrearUsuario.classList.remove("hidden");
    }

    function abrirModalEdicion(u) {
        modalUsuarioTitulo.innerText = "Editar Usuario";
        editUserIdInput.value = u.id; // ID = Editar
        newUserUserName.value = u.user_name || "";
        newUserName.value = u.name || "";
        newUserCedula.value = u.cedula || "";
        newUserDigits.value = u.digits || "";
        newUserRole.value = u.role;

        document.getElementById("btnGuardarUsuario").innerHTML = '<i class="fas fa-sync-alt"></i> Actualizar';
        modalCrearUsuario.classList.remove("hidden");
    }

    async function guardarUsuario() {
        const userName = newUserUserName.value.trim();
        const name = newUserName.value.trim();
        // Convertir a número (parseInt) para cumplir con el tipo de dato numérico en DB
        const cedula = parseInt(newUserCedula.value.trim(), 10);
        const digits = newUserDigits.value.trim(); // Se mantiene como texto para los ceros iniciales
        const role = newUserRole.value;
        const editId = editUserIdInput.value;

        if(!userName || !name || !cedula || !digits) return alert("Complete todos los campos: Usuario, Nombre, Cédula y Contraseña");

        showLoader(); // Mostrar carga

        let result;
        
        if (!editId) {
            // --- MODO CREAR ---
            // Se agrega created_at para evitar el error de not-null constraint
            result = await supabase.from('users').insert([{ 
                user_name: userName, 
                name, 
                cedula, 
                digits: digits, 
                role,
                created_at: new Date().toISOString() 
            }]);
        } else {
            // --- MODO EDITAR ---
            result = await supabase.from('users').update({ 
                user_name: userName, 
                name, 
                cedula, 
                digits: digits, 
                role 
            }).eq('id', editId);
        }

        const { error } = result;

        if(error) {
            alert("Error al guardar usuario: " + error.message);
        } else {
            showToast(editId ? "Usuario actualizado" : "Usuario creado");
            modalCrearUsuario.classList.add("hidden");
            cargarUsuarios();
        }
        hideLoader(); // Ocultar carga
    }

    async function eliminarUsuario(id) {
        if(!confirm("¿Está seguro de eliminar este usuario? Esta acción es irreversible.")) return;
        
        const { error } = await supabase.from('users').delete().eq('id', id);
        
        if(error) {
            alert("Error al eliminar: " + error.message);
        } else {
            showToast("Usuario eliminado");
            cargarUsuarios();
        }
    }

    /* ======================================
       VER REGISTROS (ADMIN vs LIDER)
    =======================================*/
    let registrosCache = [];

    // Si modo === 'admin', trae todo. Si modo === 'lider', filtra por currentUser.name
    async function verRegistros(modo) {
        if (!currentUser) return;

        try {
            let query = supabase.from('registros').select('*');
            
            if (modo === 'lider') {
                // Solo sus registros
                query = query.eq('lider', currentUser.name);
            } else {
                // Admin ve todo, ordenado por fecha
                query = query.order('id', { ascending: false });
            }

            const { data, error } = await query;

            if (error) throw error;
            if (!data || data.length === 0) {
                listaRegistrosBody.innerHTML = "<tr><td colspan='10'>No hay registros.</td></tr>";
                mostrarSeccion('ver_registros');
                return;
            }

            let html = "";

            data.forEach((r,i)=>{
                const btnEdit = `<button class="btn secondary icon-only btnEditarRegistro" data-registro='${JSON.stringify(r)}' title="Editar"><i class="fas fa-edit"></i></button>`;
                const btnDel = `<button class="btn danger icon-only" onclick="eliminarRegistro(${r.id})" title="Eliminar"><i class="fas fa-trash-alt"></i></button>`;
                const acciones = `<div style="display:flex; gap: 5px;">${btnEdit}${btnDel}</div>`;

                html+=`<tr>
                    <td>${r.nombres}</td>
                    <td>${r.apellidos}</td>
                    <td>${r.cedula}</td>
                    <td>${r.fecha_expedicion}</td>
                    <td>${r.telefono}</td>
                    <td>${r.direccion}</td>
                    <td>${r.barrio}</td>
                    <td>${r.municipio}</td>
                    <td>${r.responsable}</td>
                    <td>${acciones}</td>
                </tr>`;
            });

            registrosCache = data;
            listaRegistrosBody.innerHTML = html;
            
            // Asignar eventos a los botones de editar registros
            document.querySelectorAll(".btnEditarRegistro").forEach(b => {
                b.addEventListener("click", (e) => {
                    const r = JSON.parse(e.target.dataset.registro);

                    // Cargar datos en el MODAL de edición
                    modalEditRegistroId.value = r.id;
                    modalEditNombres.value = r.nombres;
                    modalEditApellidos.value = r.apellidos;
                    modalEditCedula.value = r.cedula;
                    modalEditFechaExpedicion.value = r.fecha_expedicion;
                    modalEditTelefono.value = r.telefono;
                    modalEditDireccion.value = r.direccion;
                    modalEditBarrio.value = r.barrio;
                    modalEditMunicipio.value = r.municipio;
                    modalEditResponsable.value = r.responsable;

                    modalEditarRegistro.classList.remove("hidden");
                });
            });
            mostrarSeccion('ver_registros');

        } catch(err) {
            console.error(err);
            alert("Error al obtener registros");
        }
    }

    document.getElementById("btnExportExcel").addEventListener("click", ()=>{
        if(registrosCache.length === 0) return alert("No hay datos para exportar");

        const datos = registrosCache.map(r => ({
            Lider: r.lider,
            Nombres: r.nombres,
            Apellidos: r.apellidos,
            Cedula: r.cedula,
            FechaExp: r.fecha_expedicion,
            Telefono: r.telefono,
            Direccion: r.direccion,
            Barrio: r.barrio,
            Municipio: r.municipio,
            Responsable: r.responsable
        }));

        const hoja = XLSX.utils.json_to_sheet(datos);
        const libro = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(libro, hoja, "Registros");
        XLSX.writeFile(libro, "registros_livianos.xlsx");
    });

    /* ====================================== */

    function nuevoRegistro() {
        editRegistroId.value = ""; // Limpiar ID para crear nuevo
        nombres.value = "";
        apellidos.value = "";
        cedula.value = "";
        fechaExpedicion.value = "";
        telefono.value = "";
        direccion.value = "";
        barrio.value = "";
        municipio.value = "";
        responsable.value = "";
        nombres.focus();
    }

    function cerrarSesion() {
        currentUser = null;
        localStorage.removeItem("liderActivo");
        localStorage.removeItem("currentUser");
        
        formularioDatos.classList.add("hidden");
        panelAdmin.classList.add("hidden");
        panelRegistros.classList.add("hidden");
        navBar.classList.add("hidden"); // Ocultar navbar
        ingresoLider.classList.remove("hidden");
        
        if(liderNombre) liderNombre.innerText = "";
    }

    // LISTENERS
    document.getElementById("btnLogin").addEventListener("click", iniciarSesion);
    document.getElementById("btnGuardar").addEventListener("click", guardarRegistro);
    
    // Botones de Logout (hay dos, uno en admin y otro en lider)
    document.querySelectorAll(".btnLogout").forEach(btn => {
        btn.addEventListener("click", cerrarSesion);
    });

    // Botones Admin
    document.getElementById("btnGuardarUsuario").addEventListener("click", guardarUsuario);
    document.getElementById("btnAbrirModalUsuario").addEventListener("click", abrirModalCreacion);
    document.getElementById("btnCerrarModalUsuario").addEventListener("click", () => modalCrearUsuario.classList.add("hidden"));

    // Botones Modal Editar Registro
    btnActualizarRegistro.addEventListener("click", actualizarRegistro);
    btnCerrarModalEditarRegistro.addEventListener("click", () => modalEditarRegistro.classList.add("hidden"));

    // Botones Navegación
    navPanelAdmin.addEventListener("click", () => mostrarSeccion('admin'));
    navNuevoRegistro.addEventListener("click", () => mostrarSeccion('registro'));
    navVerRegistros.addEventListener("click", () => {
        if (currentUser.role === 'Administrador' || currentUser.role === 'Administrador maestro' || currentUser.role === 'admin') {
            verRegistros('admin');
        } else {
            verRegistros('lider');
        }
    });
});
</script>
